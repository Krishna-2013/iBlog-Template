<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iBlog - Heave for bloggers</title>
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/utils.css" />
  <link rel="stylesheet" href="css/contact.css" />
  <link rel="shortcut icon" href="fav icon.png" type="image/x-icon" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>

<body>
  <nav class="navigation max-width-1 m-auto">
    <div class="nav-left">
      <span>iBlog</span>
      <ul>
        <li><a class="font2" href="/home.html">Home</a></li>
        <li><a class="font2" href="/contact.html">Contact</a></li>
      </ul>
    </div>

    <div class="nav-right">
      <form action="/search.html">
        <input class="form-input font2" type="text" placeholder="Search Article" name="query" />
        <button class="btn font2">Search</button>
      </form>
    </div>
  </nav>
  <hr class="nav-hr max-width-1 m-auto" />

  <div class="contact m-auto max-width-1 font1">
    <h1 class="font1 space pdTop">Feel free to contact us</h1>
    <div class="contectForm">
      <form class="formBox" action="#" method="post">
        <input class="nameBox space top" type="text" placeholder="Enter your name here:" required>
        <br>
        <input class="phoneBox space top" type="tel" placeholder="Enter your phone number here:" required>
        <br>
        <input class="emailBox space top" type="email" placeholder="Enter your email here:" required>
        <br>
        <textarea class="space top" name="message" id="message" placeholder="Enter your message:" required></textarea>
        <br>
        <button class="btnSubmit space top" type="submit">Submit</button>
      </form>
    </div>
  </div>

  </div>
  <div class="footer">
    <p class="font2">Copyright &copy; &nbsp;</p>
    <a class="font2" href="/home.html">iBlog.com</a>
    <script src="js/contact.js"></script>
  </div>
</body>

</html>
